name: CI - API Gateway

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Restore dependencies
      - name: Restore dependencies
        run: dotnet restore Deliveroo.Gateway

      # 4️⃣ Build project
      - name: Build project
        run: dotnet build Deliveroo.Gateway --no-restore --configuration Release

      # 5️⃣ Login to DockerHub
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 6️⃣ Build Docker Image
      - name: Build Docker image
        run: docker build -t vidura12/deliveroo:gateway-${{ github.sha }} .

      # 7️⃣ Push Docker Image
      - name: Push Docker image
        run: docker push vidura12/deliveroo:gateway-${{ github.sha }}